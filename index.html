<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cambridge Apartment Map · MIT Sloan</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  :root {
    --bg: #fafaf7;
    --bg-side: #f3f1ea;
    --ink: #1a1a1a;
    --muted: #6b6b6b;
    --line: #e0ddd5;
    --line-soft: #ebe8df;
    --accent: #8b1a1a;
    --accent-soft: #f2e3e3;
    --pin-property: #8b1a1a;
    --pin-hidden: #b8b8b8;
    --pin-anchor: #1a3d6b;
    --good: #2d6a4f;
    --star: #d4a017;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    font-family: ui-serif, Georgia, "Iowan Old Style", "Apple Garamond", serif;
    background: var(--bg);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
  }
  .layout {
    display: grid;
    grid-template-rows: auto 1fr;
    height: 100vh;
  }
  header {
    padding: 12px 22px;
    border-bottom: 1px solid var(--line);
    background: var(--bg);
    display: flex;
    align-items: center;
    gap: 18px;
    flex-wrap: wrap;
  }
  header h1 {
    margin: 0;
    font-size: 19px;
    font-weight: 600;
    letter-spacing: -0.01em;
  }
  header .sub {
    color: var(--muted);
    font-size: 12.5px;
    font-style: italic;
  }
  .filter-control {
    display: flex;
    gap: 6px;
    align-items: center;
    margin-left: 8px;
    font-family: ui-sans-serif, system-ui, sans-serif;
  }
  .filter-control label {
    font-size: 12px;
    color: var(--muted);
    font-style: italic;
  }
  .filter-control select {
    font-family: inherit;
    font-size: 13px;
    padding: 5px 26px 5px 10px;
    border: 1px solid var(--line);
    border-radius: 4px;
    background: white;
    color: var(--ink);
    cursor: pointer;
    appearance: none;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path d='M0 0l5 6 5-6z' fill='%236b6b6b'/></svg>");
    background-repeat: no-repeat;
    background-position: right 9px center;
  }
  .btn {
    font-family: ui-sans-serif, system-ui, sans-serif;
    font-size: 12px;
    padding: 5px 12px;
    border: 1px solid var(--line);
    border-radius: 4px;
    background: white;
    color: var(--ink);
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn:hover { background: var(--bg-side); }
  .btn-accent {
    background: var(--accent);
    color: white;
    border-color: var(--accent);
  }
  .btn-accent:hover { background: #6b1414; }
  .btn-small {
    font-size: 11px;
    padding: 3px 8px;
  }
  header .legend {
    margin-left: auto;
    display: flex;
    gap: 14px;
    font-size: 11.5px;
    color: var(--muted);
    align-items: center;
    font-family: ui-sans-serif, system-ui, sans-serif;
  }
  .legend-dot {
    display: inline-block;
    width: 10px; height: 10px;
    border-radius: 50%;
    margin-right: 5px;
    vertical-align: middle;
  }

  .main {
    display: grid;
    grid-template-columns: 290px 1fr;
    overflow: hidden;
  }
  /* Sidebar */
  aside.sidebar {
    background: var(--bg-side);
    border-right: 1px solid var(--line);
    overflow-y: auto;
    font-family: ui-sans-serif, system-ui, sans-serif;
  }
  .sidebar-header {
    padding: 12px 14px 8px;
    border-bottom: 1px solid var(--line-soft);
    background: var(--bg-side);
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .sidebar-title {
    font-family: ui-serif, Georgia, serif;
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 2px;
  }
  .sidebar-count {
    font-size: 11px;
    color: var(--muted);
    font-style: italic;
  }
  .listing-item {
    padding: 10px 14px;
    border-bottom: 1px solid var(--line-soft);
    cursor: pointer;
    transition: background 0.12s;
    position: relative;
  }
  .listing-item:hover { background: rgba(255,255,255,0.55); }
  .listing-item.hidden-state {
    opacity: 0.55;
    background: repeating-linear-gradient(45deg, transparent, transparent 6px, rgba(0,0,0,0.03) 6px, rgba(0,0,0,0.03) 12px);
  }
  .listing-item .num-and-name {
    display: flex;
    align-items: baseline;
    gap: 6px;
    margin-bottom: 3px;
  }
  .listing-item .num {
    background: var(--accent);
    color: white;
    font-size: 10px;
    font-weight: 700;
    padding: 1px 5px;
    border-radius: 3px;
    flex-shrink: 0;
  }
  .listing-item.hidden-state .num { background: var(--pin-hidden); }
  .listing-item .name {
    font-family: ui-serif, Georgia, serif;
    font-size: 13px;
    font-weight: 600;
    color: var(--ink);
    line-height: 1.25;
    flex: 1;
  }
  .listing-item .meta {
    font-size: 11.5px;
    color: var(--muted);
    margin-top: 2px;
  }
  .listing-item .meta .price {
    color: var(--accent);
    font-weight: 600;
  }
  .listing-item.hidden-state .meta .price { color: var(--pin-hidden); }
  .listing-actions {
    display: flex;
    gap: 4px;
    margin-top: 8px;
    flex-wrap: wrap;
  }
  .star-btn {
    background: none;
    border: 1px solid var(--line);
    border-radius: 3px;
    width: 24px; height: 22px;
    cursor: pointer;
    font-size: 13px;
    line-height: 1;
    color: #c0c0c0;
    padding: 0;
    transition: all 0.12s;
  }
  .star-btn.starred { color: var(--star); border-color: var(--star); background: #fdf6e3; }
  .star-btn:hover { border-color: var(--star); }
  .action-btn {
    font-family: inherit;
    font-size: 10.5px;
    padding: 2px 7px;
    border: 1px solid var(--line);
    border-radius: 3px;
    background: white;
    color: var(--muted);
    cursor: pointer;
  }
  .action-btn:hover { background: var(--bg); border-color: var(--muted); color: var(--ink); }
  .action-btn.lists { color: var(--ink); }
  .listing-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 3px;
    margin-top: 6px;
  }
  .tag {
    font-size: 10px;
    padding: 1px 6px;
    border-radius: 8px;
    background: white;
    border: 1px solid var(--line);
    color: var(--muted);
  }
  .tag.fav { background: #fdf6e3; border-color: #e8d27a; color: #8b6c00; }

  #map { width: 100%; height: 100%; }

  /* Marker styles */
  .property-marker {
    background: var(--pin-property);
    color: white;
    width: 26px;
    height: 26px;
    border-radius: 50%;
    border: 2px solid white;
    box-shadow: 0 2px 6px rgba(0,0,0,0.25);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: ui-sans-serif, system-ui, sans-serif;
    font-weight: 600;
    font-size: 13px;
    cursor: pointer;
    transition: transform 0.12s ease;
  }
  .property-marker.starred {
    background: var(--star);
    border-color: white;
  }
  .property-marker:hover { transform: scale(1.18); }
  .anchor-marker {
    background: var(--pin-anchor);
    color: white;
    width: 32px;
    height: 32px;
    border-radius: 4px;
    border: 2px solid white;
    box-shadow: 0 2px 6px rgba(0,0,0,0.25);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: ui-sans-serif, system-ui, sans-serif;
    font-weight: 700;
    font-size: 11px;
    text-align: center;
    line-height: 1;
  }

  /* Popup styling */
  .leaflet-popup-content-wrapper {
    border-radius: 6px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.18);
    padding: 0;
  }
  .leaflet-popup-content {
    margin: 0;
    width: 290px !important;
    font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
  }
  .popup { padding: 14px 16px 12px; }
  .popup .name {
    font-family: ui-serif, Georgia, serif;
    font-size: 15px;
    font-weight: 600;
    line-height: 1.25;
    margin-bottom: 2px;
    color: var(--ink);
  }
  .popup .addr { font-size: 11px; color: var(--muted); margin-bottom: 10px; font-style: italic; }
  .popup .row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 3px 0;
    font-size: 12.5px;
    border-bottom: 1px dotted var(--line);
  }
  .popup .row:last-of-type { border-bottom: none; }
  .popup .label { color: var(--muted); font-weight: 500; flex-shrink: 0; margin-right: 8px; }
  .popup .val { color: var(--ink); text-align: right; font-weight: 500; }
  .popup .val.empty { color: #c4c4c4; font-weight: 400; }
  .popup .price {
    background: var(--accent-soft);
    margin: 8px -16px;
    padding: 8px 16px;
    border-top: 1px solid var(--line);
    border-bottom: 1px solid var(--line);
    display: flex; justify-content: space-between; align-items: baseline;
  }
  .popup .price .total { font-size: 18px; font-weight: 700; color: var(--accent); }
  .popup .price .pp { font-size: 11.5px; color: var(--muted); }
  .popup .footer {
    margin-top: 10px; padding-top: 8px;
    border-top: 1px solid var(--line);
    font-size: 11px; color: var(--muted);
    text-align: center; font-style: italic;
  }
  .popup .footer .click { color: var(--accent); font-weight: 600; font-style: normal; }
  .popup .yes { color: var(--good); font-weight: 600; }
  .popup .no { color: var(--accent); font-weight: 600; }
  .leaflet-popup-tip { background: white; }
  .leaflet-control-attribution { background: rgba(255,255,255,0.85) !important; font-size: 10px !important; }

  /* Modal */
  .modal-bg {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.4);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 9999;
    font-family: ui-sans-serif, system-ui, sans-serif;
  }
  .modal-bg.show { display: flex; }
  .modal {
    background: var(--bg);
    border-radius: 6px;
    box-shadow: 0 12px 36px rgba(0,0,0,0.3);
    padding: 22px 24px;
    width: 360px;
    max-width: 90vw;
    max-height: 80vh;
    overflow-y: auto;
  }
  .modal h2 {
    font-family: ui-serif, Georgia, serif;
    font-size: 17px;
    margin: 0 0 4px;
    font-weight: 600;
  }
  .modal .modal-sub {
    font-size: 12px;
    color: var(--muted);
    font-style: italic;
    margin-bottom: 14px;
  }
  .modal-list-row {
    display: flex; align-items: center;
    gap: 10px;
    padding: 8px 4px;
    border-bottom: 1px solid var(--line-soft);
    font-size: 13px;
  }
  .modal-list-row:last-child { border-bottom: none; }
  .modal-list-row label {
    flex: 1;
    cursor: pointer;
  }
  .modal-list-row input[type="checkbox"] {
    width: 16px; height: 16px;
    cursor: pointer;
    accent-color: var(--accent);
  }
  .modal-list-row .delete-list {
    color: var(--muted);
    background: none; border: none;
    cursor: pointer; font-size: 11px;
    padding: 2px 6px;
  }
  .modal-list-row .delete-list:hover { color: var(--accent); }
  .modal-input-row {
    display: flex; gap: 8px;
    margin-top: 16px;
    padding-top: 14px;
    border-top: 1px solid var(--line);
  }
  .modal-input-row input {
    flex: 1;
    font-family: inherit;
    font-size: 13px;
    padding: 6px 10px;
    border: 1px solid var(--line);
    border-radius: 4px;
  }
  /* Add-listing form */
  .form-row { margin-bottom: 12px; }
  .form-row label, .form-grid label {
    display: block;
    font-size: 11px;
    color: var(--muted);
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    margin-bottom: 3px;
  }
  .form-row input, .form-row select,
  .form-grid input, .form-grid select {
    width: 100%;
    font-family: inherit;
    font-size: 13px;
    padding: 6px 10px;
    border: 1px solid var(--line);
    border-radius: 4px;
    background: white;
    box-sizing: border-box;
  }
  .form-row input:focus, .form-row select:focus,
  .form-grid input:focus, .form-grid select:focus {
    outline: none;
    border-color: var(--accent);
  }
  .form-hint {
    font-size: 10.5px;
    color: var(--muted);
    margin-top: 3px;
    font-style: italic;
  }
  .form-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 12px;
  }
  .form-grid:has(> div:nth-child(2):last-child) { grid-template-columns: repeat(2, 1fr); }
  .modal-actions {
    display: flex;
    gap: 8px;
    justify-content: flex-end;
    margin-top: 18px;
    padding-top: 14px;
    border-top: 1px solid var(--line);
  }
  .footer-note {
    font-size: 11px;
    color: var(--muted);
    font-style: italic;
    margin-top: 12px;
    text-align: center;
  }

  @media (max-width: 720px) {
    .main { grid-template-columns: 1fr; grid-template-rows: 240px 1fr; }
    aside.sidebar { border-right: none; border-bottom: 1px solid var(--line); }
    header { padding: 10px 14px; gap: 10px; }
    header h1 { font-size: 16px; }
    header .sub, header .legend { display: none; }
  }
</style>
</head>
<body>
<div class="layout">
  <header>
    <h1>Cambridge apartments</h1>
    <span class="sub">hover pin · click name to open · ☆ to favorite</span>
    <span id="sync-status" style="font-family: ui-sans-serif, system-ui, sans-serif; font-size: 11.5px; color: var(--muted); padding: 3px 9px; background: white; border: 1px solid var(--line); border-radius: 12px;">◌ Connecting…</span>
    <div class="filter-control">
      <label for="filter">Showing:</label>
      <select id="filter"></select>
      <button class="btn btn-small" id="manage-lists-btn">Manage lists</button>
      <button class="btn btn-small btn-accent" id="add-listing-btn">+ Add listing</button>
    </div>
    <div class="legend">
      <span><span class="legend-dot" style="background:var(--pin-property)"></span>Apartment</span>
      <span><span class="legend-dot" style="background:var(--star)"></span>Favorite</span>
      <span><span class="legend-dot" style="background:var(--pin-anchor); border-radius:2px;"></span>Reference</span>
    </div>
  </header>
  <div class="main">
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-title">Listings</div>
        <div class="sidebar-count" id="sidebar-count"></div>
      </div>
      <div id="listings-list"></div>
    </aside>
    <div id="map"></div>
  </div>
</div>

<!-- Modal: manage lists for a single listing OR all lists -->
<div class="modal-bg" id="modal-bg">
  <div class="modal" id="modal">
    <!-- Content rendered dynamically -->
  </div>
</div>

function setStatus(s, msg) {
  syncStatus = s;
  const el = document.getElementById('sync-status');
  if (!el) return;
  const colors = {
    connecting: '#888',
    synced: 'var(--good)',
    saving: '#b08900',
    error: 'var(--accent)',
    offline: '#888',
  };
  const icons = {
    connecting: '◌',
    synced: '✓',
    saving: '⟳',
    error: '⚠',
    offline: '○',
  };
  const labels = {
    connecting: 'Connecting…',
    synced: 'Synced with cloud',
    saving: 'Saving…',
    error: msg || 'Sync error',
    offline: 'Offline',
  };
  el.innerHTML = `<span style="color:${colors[s]}; font-weight:600;">${icons[s]}</span> ${labels[s]}`;
}

async function loadStateFromCloud() {
  setStatus('connecting');
  try {
    const url = `${SUPABASE_URL}/rest/v1/shared_state?id=eq.${STATE_ROW_ID}&select=data`;
    const res = await fetch(url, { headers: SB_HEADERS });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const rows = await res.json();
    if (rows.length > 0 && rows[0].data) {
      state = { ...DEFAULT_STATE, ...rows[0].data };
    } else {
      // First time — create the row
      await createInitialRow();
    }
    lastSavedSnapshot = JSON.stringify(state);
    setStatus('synced');
  } catch (e) {
    console.error('Load failed:', e);
    setStatus('error', 'Could not load — check connection');
    // Fall back to defaults — but don't crash
    state = { ...DEFAULT_STATE };
  }
}

async function createInitialRow() {
  const url = `${SUPABASE_URL}/rest/v1/shared_state`;
  const res = await fetch(url, {
    method: 'POST',
    headers: SB_HEADERS,
    body: JSON.stringify({ id: STATE_ROW_ID, data: DEFAULT_STATE }),
  });
  if (!res.ok && res.status !== 409) {
    // 409 = conflict (row exists), which is fine
    console.warn('Initial row create returned', res.status);
  }
}

let saveDebounceTimer = null;
async function saveState() {
  // Debounce — bunch up rapid changes (e.g. clicking many checkboxes)
  if (saveDebounceTimer) clearTimeout(saveDebounceTimer);
  setStatus('saving');
  saveDebounceTimer = setTimeout(async () => {
    try {
      const url = `${SUPABASE_URL}/rest/v1/shared_state?id=eq.${STATE_ROW_ID}`;
      const res = await fetch(url, {
        method: 'PATCH',
        headers: SB_HEADERS,
        body: JSON.stringify({ data: state }),
      });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const rows = await res.json();
      if (rows.length === 0) {
        // Row didn't exist yet — create it
        await createInitialRow();
      }
      lastSavedSnapshot = JSON.stringify(state);
      setStatus('synced');
    } catch (e) {
      console.error('Save failed:', e);
      setStatus('error', 'Could not save');
    }
  }, 350);
}

// Poll for remote changes every 5 seconds (so other person's changes appear)
async function pollForChanges() {
  if (syncStatus === 'saving') return; // Don't poll mid-save
  // If user is actively typing in a notes textarea, skip refresh to not wipe their input
  if (document.activeElement && document.activeElement.classList && document.activeElement.classList.contains('shared-notes-input')) return;
  try {
    const url = `${SUPABASE_URL}/rest/v1/shared_state?id=eq.${STATE_ROW_ID}&select=data`;
    const res = await fetch(url, { headers: SB_HEADERS });
    if (!res.ok) return;
    const rows = await res.json();
    if (rows.length === 0) return;
    const remoteData = rows[0].data;
    const remoteSnapshot = JSON.stringify(remoteData);
    if (remoteSnapshot !== lastSavedSnapshot && remoteSnapshot !== JSON.stringify(state)) {
      // Remote changed — pull it in
      // Preserve user's current activeFilter so they don't get yanked around
      const myFilter = state.activeFilter;
      state = { ...DEFAULT_STATE, ...remoteData, activeFilter: myFilter };
      lastSavedSnapshot = remoteSnapshot;
      refreshAll();
    }
  } catch (e) {
    // Silent — polling errors aren't critical
  }
}

    if (!res.ok) return;

    const snap = JSON.stringify(remote);
    if (snap !== lastUserListingsSnapshot) {
      userListings = remote;
      lastUserListingsSnapshot = snap;
      refreshAll();
    }
  } catch (e) { /* silent */ }
}

async function addUserListing(listing) {
  const url = `${SUPABASE_URL}/rest/v1/user_listings`;
  const res = await fetch(url, {
    method: 'POST',
    headers: SB_HEADERS,
    body: JSON.stringify(listing),
  });
  if (!res.ok) {
    const text = await res.text();
    throw new Error(`Save failed: ${text}`);
  }
  const rows = await res.json();
  return rows[0];
}

async function deleteUserListing(rowId) {
  const url = `${SUPABASE_URL}/rest/v1/user_listings?id=eq.${rowId}`;
  const res = await fetch(url, {
    method: 'DELETE',
    headers: SB_HEADERS,
  });
  if (!res.ok) throw new Error(`Delete failed: ${res.status}`);
}

// Geocode an address using OpenStreetMap's Nominatim (free, no key)
async function geocodeAddress(address) {
  const fullAddr = address.toLowerCase().includes('cambridge')
    ? address
    : `${address}, Cambridge, MA`;
  const url = `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(fullAddr)}&format=json&limit=1`;
  const res = await fetch(url, {
    headers: { 'User-Agent': 'mit-apartment-map/1.0' }
  });
  if (!res.ok) throw new Error('Geocoding failed');
  const results = await res.json();
  if (results.length === 0) throw new Error('Address not found');
  return {
    lat: parseFloat(results[0].lat),
    lon: parseFloat(results[0].lon),
    display_name: results[0].display_name,
  };
}

// Compute walking distance/time (haversine × 1.4 ÷ 3 mph)
function computeWalk(lat, lon, refLat, refLon) {
  const R = 3958.8;
  const toRad = d => d * Math.PI / 180;
  const dLat = toRad(refLat - lat);
  const dLon = toRad(refLon - lon);
  const a = Math.sin(dLat/2)**2 + Math.cos(toRad(lat)) * Math.cos(toRad(refLat)) * Math.sin(dLon/2)**2;
  const straight = 2 * R * Math.asin(Math.sqrt(a));
  const miles = Math.round(straight * 1.4 * 100) / 100;
  const mins = Math.round((miles / 3) * 60);
  return { miles, mins };
}

function renderVal(v, type) {
  if (v === '' || v === null || v === undefined)
    return '<span class="val empty">—</span>';
  if (type === 'yesno') {
    if (v === 'Yes') return '<span class="val yes">Yes</span>';
    if (v === 'No') return '<span class="val no">No</span>';
  }
  return `<span class="val">${v}</span>`;
}

function popupHTML(L_) {
  const sqftDisp = L_.sqft === '' ? '<span class="val empty">—</span>' : `<span class="val">${L_.sqft.toLocaleString()} sq ft</span>`;
  const ppDisp = L_.per_person ? `$${L_.per_person.toLocaleString()}/person` : '';
  const isFav = state.favorites.includes(L_.id);
  const hasUrl = L_.url && L_.url.length > 0;
  const titleHTML = hasUrl
    ? `<a href="${L_.url}" target="_blank" style="color:var(--ink); text-decoration: none; border-bottom: 1px dashed var(--accent);">${L_.name}</a>`
    : `<span style="color:var(--ink);">${L_.name}</span>`;
  const notesHTML = L_.static_notes
    ? `<div style="margin-top:10px; padding:8px 10px; background:#f8f5ec; border-left:2px solid var(--accent); font-size:11.5px; color:#4a4a4a; line-height:1.4; font-style:italic;">${L_.static_notes}</div>`
    : '';
  const sharedNote = (state.notes && state.notes[L_.id]) || '';
  const sharedNotesHTML = `
    <div style="margin-top:10px; padding-top:10px; border-top:1px solid var(--line);">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:4px;">
        <span style="font-size:11px; color:var(--muted); font-weight:600; text-transform:uppercase; letter-spacing:0.04em;">Shared notes</span>
        <span style="font-size:10px; color:var(--muted); font-style:italic;">visible to roommate</span>
      </div>
      <textarea
        class="shared-notes-input"
        data-listing-id="${L_.id}"
        placeholder="Add a note (saves automatically)…"
        style="width:100%; min-height:50px; padding:6px 8px; font-family:inherit; font-size:12px; border:1px solid var(--line); border-radius:4px; resize:vertical; box-sizing:border-box; background:#fcfaf4;"
      >${sharedNote.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')}</textarea>
    </div>
  `;
  const footerHTML = hasUrl
    ? `<div class="footer">Click <span class="click">title above</span> to open listing</div>`
    : `<div class="footer">${L_.is_user_added ? 'User-added listing' : 'Private listing — no public URL'}</div>`;
  const deleteHTML = L_.is_user_added
    ? `<div style="margin-top:8px; text-align:center;">
         <button class="delete-user-listing-btn" data-row-id="${L_.db_row_id}"
           style="font-family:ui-sans-serif,system-ui,sans-serif; font-size:11px; padding:4px 10px;
                  background:transparent; color:var(--accent); border:1px solid var(--accent);
                  border-radius:3px; cursor:pointer;">
           Delete this listing
         </button>
       </div>`
    : '';
  return `
    <div class="popup">
      <div class="name">
        ${isFav ? '<span style="color:var(--star);">★</span> ' : ''}
        ${titleHTML}
      </div>
      <div class="addr">${L_.address}</div>
      <div class="price">
        <span class="total">$${L_.rent.toLocaleString()}/mo</span>
        <span class="pp">${ppDisp}</span>
      </div>
      <div class="row"><span class="label">Beds / Baths</span>${renderVal(`${L_.beds} / ${L_.baths}`)}</div>
      <div class="row"><span class="label">Square footage</span>${sqftDisp}</div>
      <div class="row"><span class="label">Available</span>${renderVal(L_.available)}</div>
      <div class="row"><span class="label">Broker fee</span>${renderVal(L_.broker_fee, 'yesno')}</div>
      <div class="row"><span class="label">Dishwasher</span>${renderVal(L_.dishwasher, 'yesno')}</div>
      <div class="row"><span class="label">Washer/dryer</span>${renderVal(L_.washer_dryer)}</div>
      <div class="row"><span class="label">Outdoor space</span>${renderVal(L_.outdoor, 'yesno')}</div>
      <div class="row"><span class="label">→ Central T</span>${renderVal(`${L_.central_t_mins} min · ${L_.central_t_miles} mi`)}</div>
      <div class="row"><span class="label">→ Sloan E62</span>${renderVal(`${L_.sloan_mins} min · ${L_.sloan_miles} mi`)}</div>
      ${notesHTML}
      ${sharedNotesHTML}
      ${footerHTML}
      ${deleteHTML}
    </div>
  `;
}

function propIcon(num, isStarred) {
  return L.divIcon({
    className: '',
    html: `<div class="property-marker${isStarred ? ' starred' : ''}">${num}</div>`,
    iconSize: [26, 26],
    iconAnchor: [13, 13],
  });
}

// ---- Filtering ----
function visibleListings() {
  const f = state.activeFilter;
  if (f === 'all') return getAllListings().filter(L => !state.hidden.includes(L.id));
  if (f === 'hidden') return getAllListings().filter(L => state.hidden.includes(L.id));
  if (f === 'favorites') return getAllListings().filter(L => state.favorites.includes(L.id) && !state.hidden.includes(L.id));
  // Custom list
  if (state.lists[f]) return getAllListings().filter(L => state.lists[f].includes(L.id) && !state.hidden.includes(L.id));
  return getAllListings();
}

function refreshMap() {
  // Remove old markers
  Object.values(markers).forEach(m => map.removeLayer(m));
  markers = {};
  const visible = visibleListings();
  const bounds = [];
  visible.forEach(L_ => {
    const isStarred = state.favorites.includes(L_.id);
    const m = L.marker([L_.lat, L_.lon], {
      icon: propIcon(L_.display_num, isStarred),
      title: `#${L_.display_num}. ${L_.name}`,
    }).addTo(map);
    m.bindPopup(popupHTML(L_), { maxWidth: 320, autoPan: true });
    m.on('mouseover', function() { this.openPopup(); });
    m.on('popupopen', function() {
      // Wire up notes textarea inside the popup
      const ta = document.querySelector(`.shared-notes-input[data-listing-id="${L_.id}"]`);
      if (ta) {
        ta.addEventListener('input', () => {
          if (!state.notes) state.notes = {};
          state.notes[L_.id] = ta.value;
          saveState();
        });
        // Stop map drag/scroll from interfering when typing
        ta.addEventListener('mousedown', (e) => e.stopPropagation());
        ta.addEventListener('dblclick', (e) => e.stopPropagation());
      }
      // Wire up delete button if it's a user-added listing
      const delBtn = document.querySelector(`.delete-user-listing-btn[data-row-id="${L_.db_row_id}"]`);
      if (delBtn) {
        delBtn.addEventListener('click', async () => {
          if (!confirm(`Delete "${L_.name}"? This cannot be undone.`)) return;
          delBtn.disabled = true;
          delBtn.textContent = 'Deleting…';
          try {
            await deleteUserListing(L_.db_row_id);
            // Remove from local cache and refresh
            userListings = userListings.filter(u => u.id !== L_.db_row_id);
            lastUserListingsSnapshot = JSON.stringify(userListings);
            map.closePopup();
            refreshAll();
          } catch (e) {
            alert('Could not delete listing: ' + e.message);
            delBtn.disabled = false;
            delBtn.textContent = 'Delete this listing';
          }
        });
      }
    });
    markers[L_.id] = m;
    bounds.push([L_.lat, L_.lon]);
  });
  // Fit bounds (if any)
  if (bounds.length > 0) {
    bounds.push(CENTRAL_T, SLOAN);
    map.fitBounds(bounds, { padding: [50, 50], maxZoom: 16 });
  }
}

// ---- Filter dropdown ----
function refreshFilterDropdown() {
  const sel = document.getElementById('filter');
  sel.innerHTML = '';
  const opts = [
    { val: 'all', label: `All (${getAllListings().length - state.hidden.length})` },
    { val: 'favorites', label: `★ Favorites (${state.favorites.filter(id => !state.hidden.includes(id)).length})` },
  ];
  Object.keys(state.lists).sort().forEach(name => {
    const count = state.lists[name].filter(id => !state.hidden.includes(id)).length;
    opts.push({ val: name, label: `${name} (${count})` });
  });
  opts.push({ val: 'hidden', label: `Hidden (${state.hidden.length})` });
  opts.forEach(o => {
    const opt = document.createElement('option');
    opt.value = o.val;
    opt.textContent = o.label;
    if (o.val === state.activeFilter) opt.selected = true;
    sel.appendChild(opt);
  });
}

// ---- Sidebar ----
function refreshSidebar() {
  const container = document.getElementById('listings-list');
  container.innerHTML = '';
  const visible = visibleListings();
  document.getElementById('sidebar-count').textContent =
    `${visible.length} of ${getAllListings().length} shown`;

  // Show all listings, but indicate which are hidden differently
  let toRender;
  if (state.activeFilter === 'hidden') {
    toRender = getAllListings().filter(L => state.hidden.includes(L.id));
  } else {
    toRender = visible;
  }

  if (toRender.length === 0) {
    container.innerHTML = '<div style="padding: 20px 14px; color: var(--muted); font-size: 12px; font-style: italic; text-align: center;">No listings in this view.</div>';
    return;
  }

  toRender.forEach(L_ => {
    const isHidden = state.hidden.includes(L_.id);
    const isFav = state.favorites.includes(L_.id);
    const inLists = Object.keys(state.lists).filter(n => state.lists[n].includes(L_.id));
    const hasNote = state.notes && state.notes[L_.id] && state.notes[L_.id].trim().length > 0;

    const item = document.createElement('div');
    item.className = 'listing-item' + (isHidden ? ' hidden-state' : '');
    item.innerHTML = `
      <div class="num-and-name">
        <span class="num">${L_.display_num}</span>
        <span class="name">${L_.name}</span>
      </div>
      <div class="meta">
        <span class="price">$${L_.rent.toLocaleString()}/mo</span> ·
        ${L_.beds}BR/${L_.baths}BA ·
        ${L_.central_t_mins}min to T
      </div>
      <div class="listing-actions">
        <button class="star-btn ${isFav ? 'starred' : ''}" data-action="fav" data-id="${L_.id}" title="${isFav ? 'Unfavorite' : 'Favorite'}">★</button>
        <button class="action-btn" data-action="hide" data-id="${L_.id}">${isHidden ? 'Unhide' : 'Hide'}</button>
        <button class="action-btn lists" data-action="lists" data-id="${L_.id}">Lists${inLists.length ? ` (${inLists.length})` : ''}</button>
      </div>
      ${(isFav || inLists.length || hasNote) ? `
        <div class="listing-tags">
          ${isFav ? '<span class="tag fav">★ Favorite</span>' : ''}
          ${hasNote ? '<span class="tag" style="background:#eef5e9; border-color:#bcd9b0; color:#3d6a2a;">📝 Note</span>' : ''}
          ${inLists.map(n => `<span class="tag">${n}</span>`).join('')}
        </div>
      ` : ''}
    `;

    // Click on item itself (not button) zooms to and opens popup
    item.addEventListener('click', (e) => {
      if (e.target.closest('button')) return;
      if (markers[L_.id]) {
        map.setView([L_.lat, L_.lon], 17, { animate: true });
        markers[L_.id].openPopup();
      }
    });
    container.appendChild(item);
  });

  // Wire up action buttons
  container.querySelectorAll('button[data-action]').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const action = btn.dataset.action;
      // IDs can be numbers (curated) or strings like "u_5" (user-added) — keep as-is
      const rawId = btn.dataset.id;
      const id = rawId.startsWith('u_') ? rawId : parseInt(rawId);
      if (action === 'fav') toggleFav(id);
      else if (action === 'hide') toggleHide(id);
      else if (action === 'lists') openListsModal(id);
    });
  });
}

// ---- Actions ----
function toggleFav(id) {
  const i = state.favorites.indexOf(id);
  if (i >= 0) state.favorites.splice(i, 1);
  else state.favorites.push(id);
  saveState();
  refreshAll();
}

function toggleHide(id) {
  const i = state.hidden.indexOf(id);
  if (i >= 0) state.hidden.splice(i, 1);
  else state.hidden.push(id);
  saveState();
  refreshAll();
}

function refreshAll() {
  refreshFilterDropdown();
  refreshSidebar();
  refreshMap();
}

// ---- Modal: per-listing list management ----
function openListsModal(listingId) {
  const L_ = getAllListings().find(x => x.id === listingId);
  const modal = document.getElementById('modal');
  modal.style.width = '';  // Reset to default
  const lists = Object.keys(state.lists).sort();

  modal.innerHTML = `
    <h2>Add to lists</h2>
    <div class="modal-sub">${L_.name}</div>
    <div id="modal-lists">
      ${lists.length === 0 ? '<div style="font-size:12px; color:var(--muted); font-style:italic; padding: 8px 0;">No lists yet — create one below.</div>' :
        lists.map(name => `
          <div class="modal-list-row">
            <input type="checkbox" id="ml-${name}" ${state.lists[name].includes(listingId) ? 'checked' : ''} data-list="${name}"/>
            <label for="ml-${name}">${name} <span style="color:var(--muted); font-size:11px;">(${state.lists[name].length})</span></label>
          </div>
        `).join('')
      }
    </div>
    <div class="modal-input-row">
      <input type="text" id="new-list-input" placeholder="New list name (e.g. 'Top picks')" maxlength="30"/>
      <button class="btn" id="add-new-list">+ Create</button>
    </div>
    <div class="modal-actions">
      <button class="btn btn-accent" id="modal-done">Done</button>
    </div>
  `;
  document.getElementById('modal-bg').classList.add('show');

  // Wire up
  modal.querySelectorAll('input[type="checkbox"][data-list]').forEach(cb => {
    cb.addEventListener('change', () => {
      const name = cb.dataset.list;
      const idx = state.lists[name].indexOf(listingId);
      if (cb.checked && idx < 0) state.lists[name].push(listingId);
      else if (!cb.checked && idx >= 0) state.lists[name].splice(idx, 1);
      saveState();
    });
  });
  document.getElementById('add-new-list').addEventListener('click', () => {
    const input = document.getElementById('new-list-input');
    const name = input.value.trim();
    if (!name) return;
    if (state.lists[name]) { alert('A list with that name already exists.'); return; }
    state.lists[name] = [listingId];
    saveState();
    openListsModal(listingId);
  });
  document.getElementById('modal-done').addEventListener('click', closeModal);
}

// ---- Modal: manage all lists ----
function openManageListsModal() {
  const modal = document.getElementById('modal');
  modal.style.width = '';  // Reset to default
  const lists = Object.keys(state.lists).sort();
  modal.innerHTML = `
    <h2>Manage lists</h2>
    <div class="modal-sub">Delete a list — listings stay in your dataset.</div>
    <div>
      ${lists.length === 0 ? '<div style="font-size:12px; color:var(--muted); font-style:italic; padding: 8px 0;">No lists yet. Create one by clicking "Lists" on any listing in the sidebar.</div>' :
        lists.map(name => `
          <div class="modal-list-row">
            <label style="font-weight: 500;">${name} <span style="color:var(--muted); font-size:11px; font-weight:400;">(${state.lists[name].length} listing${state.lists[name].length === 1 ? '' : 's'})</span></label>
            <button class="delete-list" data-list="${name}">Delete list</button>
          </div>
        `).join('')
      }
    </div>
    <div class="modal-actions">
      <button class="btn btn-accent" id="modal-done">Done</button>
    </div>
  `;
  document.getElementById('modal-bg').classList.add('show');

  modal.querySelectorAll('.delete-list').forEach(btn => {
    btn.addEventListener('click', () => {
      const name = btn.dataset.list;
      if (!confirm(`Delete list "${name}"? The listings in it will not be deleted.`)) return;
      delete state.lists[name];
      if (state.activeFilter === name) state.activeFilter = 'all';
      saveState();
      openManageListsModal();
      refreshAll();
    });
  });
  document.getElementById('modal-done').addEventListener('click', closeModal);
}

async function handleAddListingSubmit() {
  const errBox = document.getElementById('add-listing-error');
  const saveBtn = document.getElementById('modal-save-listing');
  const showError = (msg) => {
    errBox.textContent = msg;
    errBox.style.display = 'block';
  };
  errBox.style.display = 'none';

  const address = document.getElementById('f-address').value.trim();
  if (!address) { showError('Address is required.'); return; }

  const get = (id) => document.getElementById(id).value.trim();
  const num = (id) => {
    const v = get(id);
    return v === '' ? null : Number(v);
  };

  const payload = {
    address,
    name: get('f-name') || address.split(',')[0],
    url: get('f-url'),
    beds: num('f-beds'),
    baths: num('f-baths'),
    rent: num('f-rent'),
    sqft: num('f-sqft'),
    available: get('f-available'),
    broker_fee: get('f-broker'),
    dishwasher: get('f-dishwasher'),
    washer_dryer: get('f-washer'),
    outdoor: get('f-outdoor'),
  };

  saveBtn.disabled = true;
  saveBtn.textContent = 'Geocoding address…';

  try {
    const geo = await geocodeAddress(address);
    payload.lat = geo.lat;
    payload.lon = geo.lon;
  } catch (e) {
    showError('Could not find that address. Please double-check it (street + city) and try again.');
    saveBtn.disabled = false;
    saveBtn.textContent = 'Add to map';
    return;
  }

  // Compute walking distances
  const cw = computeWalk(payload.lat, payload.lon, CENTRAL_T[0], CENTRAL_T[1]);
  const sw = computeWalk(payload.lat, payload.lon, SLOAN[0], SLOAN[1]);
  payload.central_t_miles = cw.miles;
  payload.central_t_mins = cw.mins;
  payload.sloan_miles = sw.miles;
  payload.sloan_mins = sw.mins;

  saveBtn.textContent = 'Saving…';
  try {
    const saved = await addUserListing(payload);
    userListings.push(saved);
    lastUserListingsSnapshot = JSON.stringify(userListings);
    closeModal();
    refreshAll();
    // Pan to the new listing
    setTimeout(() => {
      map.setView([payload.lat, payload.lon], 17, { animate: true });
    }, 200);
  } catch (e) {
    showError('Could not save: ' + e.message);
    saveBtn.disabled = false;
    saveBtn.textContent = 'Add to map';
  }
}

function closeModal() {
  document.getElementById('modal-bg').classList.remove('show');
}
document.getElementById('modal-bg').addEventListener('click', (e) => {
  if (e.target.id === 'modal-bg') closeModal();
});

// ---- Filter change (LOCAL ONLY — your view doesn't sync to roommate) ----
document.getElementById('filter').addEventListener('change', (e) => {
  state.activeFilter = e.target.value;
  // Note: intentionally not calling saveState() — each person sees their own filter
  refreshSidebar();
  refreshMap();
});

document.getElementById('manage-lists-btn').addEventListener('click', openManageListsModal);
document.getElementById('add-listing-btn').addEventListener('click', openAddListingModal);

// ---- Init ----
(async function init() {
  refreshAll();          // Render with default state immediately so map isn't blank
  await Promise.all([
    loadStateFromCloud(),
    loadUserListings(),
  ]);
  refreshAll();          // Re-render with cloud data
  // Poll for changes every 5 seconds
  setInterval(pollForChanges, 5000);
  setInterval(pollUserListings, 7000);  // Slightly offset so they don't fire together
})();
</script>
